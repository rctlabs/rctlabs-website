<svg viewBox="0 0 480 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="RCT Labs">
  <!--
    RCT Labs — Horizontal Logo
    Left 128×128: orbital mark scaled from 512×512 (factor 0.25, center at 64,64)
    Right: "RCT Labs" logotype text
    Color: #1A1A1A — inverted to white in dark mode via CSS filter brightness-0 invert
    Used by: navbar desktop, footer, schema.org structured data
  -->

  <!-- ── Orbital mark (scaled 0.25×, center 64,64) ── -->

  <!-- Diagonal axis: (37,92) → (101,27) -->
  <line x1="37" y1="92" x2="101" y2="27" stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Outer arc: r=52, gap -30° to -60° -->
  <!-- Start at -30°: (109,38)  End at -60°: (90,19) -->
  <path d="M 109 38 A 52 52 0 1 1 90 19" stroke="#1A1A1A" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Middle arc: r=39 -->
  <!-- Start at -30°: (98,45)  End at -60°: (84,30) -->
  <path d="M 98 45 A 39 39 0 1 1 84 30" stroke="#1A1A1A" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Inner arc: r=26 -->
  <!-- Start at -30°: (87,51)  End at -60°: (77,42) -->
  <path d="M 87 51 A 26 26 0 1 1 77 42" stroke="#1A1A1A" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Center node (r=12) -->
  <circle cx="64" cy="64" r="12" fill="#1A1A1A"/>

  <!-- Outer node (r=7) — upper-right at -45° on outer ring -->
  <circle cx="101" cy="27" r="7" fill="#1A1A1A"/>

  <!-- Inner node (r=4.5) — lower-left at 135° on middle ring -->
  <circle cx="37" cy="92" r="4.5" fill="#1A1A1A"/>

  <!-- ── Logotype text ── -->
  <text
    dominant-baseline="central"
    font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif"
    fill="#1A1A1A"
  >
    <tspan x="148" y="64" font-size="58" font-weight="700" letter-spacing="-1.5">RCT</tspan><tspan font-size="58" font-weight="400" letter-spacing="-0.5"> Labs</tspan>
  </text>
</svg>
