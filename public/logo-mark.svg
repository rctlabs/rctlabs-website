<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!--
    RCT Labs — Orbital Mark
    Geometry: 3 concentric arcs (r=208/156/104), diagonal axis line, 3 orbital nodes
    Gap: upper-right, centered at -45° (between -30° and -60°)
    Axis: from lower-left node (middle ring, 135°) through center to upper-right node (outer ring, -45°)
    Colors: #1A1A1A — inverted to white in dark mode via CSS filter brightness-0 invert
  -->

  <!-- Diagonal axis line: lower-left (146,366) → upper-right (403,109), passes through center (256,256) -->
  <line x1="146" y1="366" x2="403" y2="109" stroke="#1A1A1A" stroke-width="14" stroke-linecap="round"/>

  <!-- Outer orbital arc: r=208, gap from -30° to -60° (upper-right), clockwise 330° -->
  <!-- Start at -30°: (436,152)  End at -60°: (360,76) -->
  <path d="M 436 152 A 208 208 0 1 1 360 76" stroke="#1A1A1A" stroke-width="25" stroke-linecap="round"/>

  <!-- Middle orbital arc: r=156, same gap angles -->
  <!-- Start at -30°: (391,178)  End at -60°: (334,121) -->
  <path d="M 391 178 A 156 156 0 1 1 334 121" stroke="#1A1A1A" stroke-width="21" stroke-linecap="round"/>

  <!-- Inner orbital arc: r=104, same gap angles -->
  <!-- Start at -30°: (346,204)  End at -60°: (308,166) -->
  <path d="M 346 204 A 104 104 0 1 1 308 166" stroke="#1A1A1A" stroke-width="17" stroke-linecap="round"/>

  <!-- Center node (large) — primary anchor of the system -->
  <circle cx="256" cy="256" r="49" fill="#1A1A1A"/>

  <!-- Outer node (medium) — upper-right, sits in the arc gap at -45° on outer ring -->
  <circle cx="403" cy="109" r="28" fill="#1A1A1A"/>

  <!-- Inner node (small) — lower-left, at 135° on middle ring -->
  <circle cx="146" cy="366" r="17" fill="#1A1A1A"/>
</svg>
