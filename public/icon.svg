<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RCT Ecosystem — Official Favicon Mark -->
  <!-- Dark background with rounded corners, matching brand identity -->
  <rect width="180" height="180" rx="38" fill="#0D0D0D"/>
  <!-- Orbital ring — RCT brand language: circular intelligence orbit -->
  <circle cx="90" cy="90" r="72" stroke="#D4A853" stroke-width="2.5" stroke-opacity="0.28" fill="none"/>
  <!-- Letter R — primary lettermark in warm amber -->
  <!-- Vertical stem -->
  <line x1="52" y1="46" x2="52" y2="134" stroke="#D4A853" stroke-width="18" stroke-linecap="round"/>
  <!-- R bowl: top bar + arc + return to middle -->
  <path d="M52 46 H96 Q130 46 130 73 Q130 100 96 100 H52" stroke="#D4A853" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- R leg: diagonal from midpoint bowl to bottom-right -->
  <line x1="96" y1="100" x2="130" y2="134" stroke="#D4A853" stroke-width="16" stroke-linecap="round"/>
</svg>
