<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    RCT Labs — Browser Tab / PWA Icon
    Dark rounded square background, orbital mark in white with amber center node
    Supports: favicon, PWA launcher icon, Open Graph social preview
  -->

  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#0D0D0D"/>

  <!-- Diagonal axis: lower-left → upper-right -->
  <line x1="146" y1="366" x2="403" y2="109" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Outer orbital arc (r=208) -->
  <path d="M 436 152 A 208 208 0 1 1 360 76" stroke="white" stroke-width="25" stroke-linecap="round"/>

  <!-- Middle orbital arc (r=156) -->
  <path d="M 391 178 A 156 156 0 1 1 334 121" stroke="white" stroke-width="21" stroke-linecap="round"/>

  <!-- Inner orbital arc (r=104) -->
  <path d="M 346 204 A 104 104 0 1 1 308 166" stroke="white" stroke-width="17" stroke-linecap="round"/>

  <!-- Center node — amber accent -->
  <circle cx="256" cy="256" r="49" fill="#D4A853"/>

  <!-- Outer node — white -->
  <circle cx="403" cy="109" r="28" fill="white"/>

  <!-- Inner node — white -->
  <circle cx="146" cy="366" r="17" fill="white"/>
</svg>
